<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CARGO מסירה">
<meta name="theme-color" content="#F6F8FB">
<title>אישור מסירה — CARGO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --ink:#101828; --ink-soft:#344054; --muted:#667085;
    --paper:#F6F8FB; --surface:#FFFFFF;
    --line:#E4E7EC; --line-strong:#D0D5DD;
    --accent:#1570EF; --accent-dark:#175CD3; --accent-tint:#EFF6FF;
    --ok:#12B76A; --ok-tint:#ECFDF3;
    --err:#F04438; --err-tint:#FEF3F2;
    --radius-lg:18px; --radius-md:14px; --radius-sm:10px;
    --shadow-card: 0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
    --shadow-pop: 0 4px 8px rgba(16,24,40,.06), 0 12px 24px rgba(16,24,40,.08);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{
    margin:0; min-height:100vh; background:var(--paper); color:var(--ink);
    font-family:'Rubik', system-ui, sans-serif;
    display:flex; flex-direction:column; align-items:center; padding:28px 16px 48px;
  }
  body.centered{ justify-content:center; padding-top:16px; padding-bottom:16px; }
  .wrap{width:100%; max-width:420px}

  .brand{display:flex; align-items:center; justify-content:center; gap:9px; margin-bottom:26px}
  .brand-mark{
    width:26px; height:26px; border-radius:8px; background:var(--accent);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .brand-mark svg{width:15px; height:15px}
  .brand span{font-weight:700; font-size:14px; color:var(--ink-soft); letter-spacing:.2px}

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg);
    padding:26px 22px; margin-bottom:14px; box-shadow:var(--shadow-card);
  }

  label{display:block; font-size:12.5px; font-weight:600; color:var(--muted); margin-bottom:7px; letter-spacing:.1px}
  .field{position:relative; margin-bottom:16px}
  .field svg{position:absolute; top:50%; right:14px; transform:translateY(-50%); width:18px; height:18px; color:var(--muted); pointer-events:none}
  input[type=text],input[type=email],input[type=password]{
    width:100%; padding:13px 42px 13px 14px; border-radius:var(--radius-sm); border:1.5px solid var(--line);
    font-family:inherit; font-size:15.5px; background:var(--surface); color:var(--ink);
    transition:border-color .15s;
  }
  input:focus{outline:none; border-color:var(--accent)}
  .field input{margin-bottom:0}

  .primary{
    width:100%; padding:15px; border:none; border-radius:var(--radius-md); background:var(--accent);
    color:#fff; font-family:inherit; font-size:15.5px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:background .15s, transform .1s;
  }
  .primary:active{background:var(--accent-dark); transform:scale(.99)}
  .primary:disabled{opacity:.55; pointer-events:none}

  .errbox{
    background:var(--err-tint); color:#B42318; border-radius:var(--radius-sm); padding:11px 14px;
    font-size:13.5px; margin-bottom:14px; display:none; font-weight:500;
  }
  .errbox.show{display:block}

  .step{border:1px solid var(--line); border-radius:var(--radius-lg); padding:18px; margin-bottom:12px; background:var(--surface); box-shadow:var(--shadow-card)}
  .step-head{display:flex; align-items:center; gap:10px; margin-bottom:12px}
  .step-num{
    width:24px; height:24px; border-radius:50%; background:var(--accent-tint); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0;
  }
  .step-num.done{background:var(--ok-tint); color:var(--ok)}
  .step h3{margin:0; font-size:15px; font-weight:700; color:var(--ink)}
  .step p.hint{margin:0 0 12px 34px; font-size:13px; color:var(--muted); line-height:1.5}

  .scan-row{display:flex; gap:8px}
  .scan-row .field{flex:1; margin-bottom:0}
  .scanbtn{
    width:48px; height:48px; border-radius:var(--radius-sm); border:1.5px solid var(--line);
    background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
  }
  .scanbtn svg{width:20px; height:20px; color:var(--ink-soft)}
  .scanbtn:active{background:var(--paper)}

  .filebtn{
    display:flex; align-items:center; justify-content:center; gap:9px; width:100%;
    padding:14px; border-radius:var(--radius-sm); border:1.5px dashed var(--line-strong); background:var(--paper);
    font-family:inherit; font-size:14.5px; font-weight:600; color:var(--ink-soft); cursor:pointer;
  }
  .filebtn svg{width:18px; height:18px}
  .filebtn.done{border-style:solid; border-color:var(--ok); background:var(--ok-tint); color:var(--ok)}
  input[type=file]{display:none}
  .thumb{margin-top:10px; width:100%; max-height:190px; object-fit:cover; border-radius:var(--radius-sm); display:none}
  .thumb.show{display:block}

  #scanner-overlay{
    position:fixed; inset:0; background:rgba(16,24,40,.92); z-index:50; display:none;
    flex-direction:column; align-items:center; justify-content:center; padding:20px;
  }
  #scanner-overlay.show{display:flex}
  #reader{width:100%; max-width:380px; min-height:260px; border-radius:16px; overflow:hidden; background:#000}
  .scan-hint{color:#fff; opacity:.75; font-size:13px; margin-top:14px; text-align:center}
  .close-scan{
    margin-top:16px; padding:12px 28px; border-radius:var(--radius-sm); border:none; background:#fff;
    font-weight:700; font-family:inherit; font-size:14px; display:flex; align-items:center; gap:8px;
  }
  .close-scan svg{width:16px; height:16px}

  .topbar{width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:16px}
  .topbar .name{font-weight:700; font-size:14.5px; color:var(--ink)}
  .topbar button{
    background:none; border:none; color:var(--muted); font-size:13px; font-family:inherit;
    display:flex; align-items:center; gap:5px; cursor:pointer;
  }
  .topbar button svg{width:14px; height:14px}

  .pending-pill{
    display:none; align-items:center; gap:8px; background:var(--accent-tint); color:var(--accent-dark);
    padding:9px 14px; border-radius:999px; font-size:12.5px; font-weight:600; margin-bottom:14px; width:fit-content;
  }
  .pending-pill.show{display:flex}
  .pending-pill .dot{width:6px; height:6px; border-radius:50%; background:var(--accent); animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  .retry-banner{
    display:none; align-items:center; justify-content:space-between; gap:10px;
    background:var(--err-tint); border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:14px;
  }
  .retry-banner.show{display:flex}
  .retry-banner span{font-size:13px; color:#B42318; font-weight:500}
  .retry-banner button{
    background:#fff; border:1px solid #F0AEA9; color:#B42318; font-size:12.5px; font-weight:700;
    padding:7px 12px; border-radius:8px; font-family:inherit; cursor:pointer; flex-shrink:0;
  }

  .msg{text-align:center; padding:56px 20px; display:none}
  .msg.show{display:block}
  .stamp{
    width:72px; height:72px; border-radius:50%; margin:0 auto 18px;
    display:flex; align-items:center; justify-content:center;
  }
  .stamp.ok{background:var(--ok-tint)}
  .stamp.ok svg{width:32px; height:32px; color:var(--ok)}
  .stamp.err{background:var(--err-tint)}
  .stamp.err svg{width:32px; height:32px; color:var(--err)}
  .spinner{
    width:30px; height:30px; border-radius:50%; border:3px solid var(--line);
    border-top-color:var(--accent); animation:spin .8s linear infinite; margin:0 auto 16px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .msg h2{margin:0 0 6px; font-size:18px; font-weight:700}
  .msg p{margin:0; color:var(--muted); font-size:14px}

  [data-screen]{display:none; width:100%}
  [data-screen].show{display:block}
</style>
</head>
<body class="centered">
<div class="wrap">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none"><path d="M21 8L12 3L3 8M21 8L12 13M21 8V16L12 21M12 13L3 8M12 13V21M3 8V16L12 21" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <span>CARGO · אישור מסירה</span>
  </div>

  <div data-screen="loading" class="msg show"><div class="spinner"></div><p>טוען…</p></div>

  <!-- LOGIN -->
  <div data-screen="login">
    <div class="card">
      <div class="errbox" id="loginErr"></div>

      <div id="phoneStep">
        <label>מספר טלפון</label>
        <div class="field" style="margin-bottom:20px">
          <input type="tel" id="phoneInput" autocomplete="tel" placeholder="05XXXXXXXX" inputmode="numeric">
          <svg viewBox="0 0 24 24" fill="none"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92Z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <button class="primary" id="sendCodeBtn">שליחת קוד</button>
      </div>

      <div id="codeStep" style="display:none">
        <label>קוד אימות</label>
        <div class="field" style="margin-bottom:20px">
          <input type="tel" id="codeInput" autocomplete="one-time-code" placeholder="123456" inputmode="numeric">
          <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="10" width="16" height="10" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
        <button class="primary" id="verifyCodeBtn">אישור</button>
        <button class="primary" id="resendBtn" style="background:transparent; color:var(--muted); margin-top:8px; box-shadow:none">שליחה חוזרת</button>
      </div>

      <div id="recaptcha-container"></div>
    </div>
  </div>

  <!-- MAIN FORM -->
  <div data-screen="main">
    <div class="topbar">
      <span class="name" id="driverLabel"></span>
      <button id="logoutBtn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        התנתקות
      </button>
    </div>

    <div class="pending-pill" id="pendingPill"><span class="dot"></span><span id="pendingText"></span></div>
    <div class="retry-banner" id="retryBanner">
      <span id="retryText"></span>
      <button id="retryBtn">נסה שוב</button>
    </div>

    <div class="step">
      <div class="step-head">
        <div class="step-num">1</div>
        <h3>סריקת ברקוד המשלוח</h3>
      </div>
      <p class="hint">סרקו את הברקוד או הקלידו את מספר המשלוח ידנית</p>
      <div class="scan-row">
        <div class="field">
          <input type="text" id="shipmentInput" placeholder="מספר משלוח">
        </div>
        <button class="scanbtn" id="scanBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M7 8v8M11 8v8M14 8v8M17 8v8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <div class="step">
      <div class="step-head">
        <div class="step-num" id="doorNum">2</div>
        <h3>תמונת המשלוח בדלת</h3>
      </div>
      <p class="hint">צילום של החבילה במקום ההשארה</p>
      <div style="display:flex; gap:8px">
        <button class="filebtn" id="doorBtn" type="button" style="flex:1">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 8a2 2 0 0 1 2-2h1.2a1 1 0 0 0 .83-.45l.94-1.4a1 1 0 0 1 .83-.45h4.4a1 1 0 0 1 .83.45l.94 1.4a1 1 0 0 0 .83.45H18a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><circle cx="12" cy="13" r="3.2" stroke="currentColor" stroke-width="1.7"/></svg>
          <span id="doorBtnText">מצלמה</span>
        </button>
        <button class="filebtn" id="doorGalleryBtn" type="button" style="flex:1">
          <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.7"/><circle cx="8.5" cy="9" r="1.3" fill="currentColor"/><path d="M21 15l-5-4-4.5 3.5L8 12l-5 4" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
          <span>גלריה</span>
        </button>
      </div>
      <input type="file" id="doorInput" accept="image/*" capture="environment">
      <input type="file" id="doorGalleryInput" accept="image/*">
      <img class="thumb" id="doorThumb">
    </div>

    <div class="step">
      <div class="step-head">
        <div class="step-num" id="approvalNum">3</div>
        <h3>צילום מסך אישור וואטסאפ</h3>
      </div>
      <p class="hint">צילום המסך של אישור הלקוח/ה בוואטסאפ</p>
      <button class="filebtn" id="approvalBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.7"/><circle cx="8.5" cy="9" r="1.3" fill="currentColor"/><path d="M21 15l-5-4-4.5 3.5L8 12l-5 4" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
        <span id="approvalBtnText">בחירת תמונה</span>
      </button>
      <input type="file" id="approvalInput" accept="image/*">
      <img class="thumb" id="approvalThumb">
    </div>

    <div class="errbox" id="submitErr"></div>
    <button class="primary" id="submitBtn">שליחת אישור מסירה</button>
  </div>

  <div data-screen="success" class="msg">
    <div class="stamp ok">
      <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h2>נשלח בהצלחה</h2>
    <p>אישור המסירה למשלוח <b id="successNum"></b> נקלט במערכת.</p>
    <button class="primary" id="nextBtn" style="margin-top:22px">משלוח הבא</button>
  </div>
</div>

<div id="scanner-overlay">
  <div id="reader"></div>
  <p class="scan-hint" id="scan-hint-text">כוונו את הברקוד למרכז המסגרת</p>
  <button class="close-scan" id="closeScan">
    <svg viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    סגירה
  </button>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import {
    getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged, signOut,
    setPersistence, browserLocalPersistence
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import {
    getFirestore, doc, getDoc
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: 'AIzaSyAg8xDchkrdiaTmTTiteYcwsw5P76pHYfQ',
    authDomain: 'cargo-deliveries.firebaseapp.com',
    projectId: 'cargo-deliveries',
    storageBucket: 'cargo-deliveries.firebasestorage.app',
    messagingSenderId: '1077240894775',
    appId: '1:1077240894775:web:3ccdfe0ff8fe515a62f6b2'
  };

  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby8tHd_bS_zGaj6Qdkdz1dFXwagqEiwN84eJL31bLmMQdade9uTd6W9UYPdrG09ER2w/exec';

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  setPersistence(auth, browserLocalPersistence).catch(() => {});
  const db = getFirestore(app);

  const els = id => document.getElementById(id);
  const CENTERED_SCREENS = ['loading', 'login', 'success'];
  const showScreen = name => {
    document.querySelectorAll('[data-screen]').forEach(s => s.classList.toggle('show', s.dataset.screen === name));
    document.body.classList.toggle('centered', CENTERED_SCREENS.includes(name));
  };

  let currentDriverName = '';
  let confirmationResult = null;
  let recaptchaVerifier = null;

  function toE164(local){
    const digits = String(local || '').replace(/\D/g, '');
    if (digits.startsWith('972')) return '+' + digits;
    if (digits.startsWith('0')) return '+972' + digits.slice(1);
    return '+972' + digits;
  }

  const MAX_SESSION_AGE_MS = 24 * 60 * 60 * 1000; // 24 hours

  function checkSessionAge(){
    const user = auth.currentUser;
    if (!user) return true;
    const lastSignIn = new Date(user.metadata.lastSignInTime).getTime();
    if (Date.now() - lastSignIn > MAX_SESSION_AGE_MS) {
      signOut(auth);
      els('loginErr').textContent = 'עברו 24 שעות מההתחברות האחרונה. יש להתחבר מחדש.';
      els('loginErr').classList.add('show');
      return false;
    }
    return true;
  }
  setInterval(checkSessionAge, 5 * 60 * 1000); // catch the 24h boundary even in a long-open tab

  onAuthStateChanged(auth, async user => {
    if (!user) { showScreen('login'); return; }

    // Token refreshes happen silently and constantly in the background —
    // they do NOT reset this timestamp. Only an actual SMS verification
    // does. That's exactly what makes this check meaningful: a lost phone
    // still "logged in" from yesterday gets kicked back to needing a real
    // code, even though its cached token would otherwise still be valid.
    if (!checkSessionAge()) return;

    // Firebase will happily verify ANY real phone number by SMS — being
    // logged in does not by itself mean this is an approved CARGO driver.
    // The Firestore document is the actual gate: only phone numbers we've
    // deliberately added have one.
    let snap;
    try {
      snap = await getDoc(doc(db, 'drivers', user.phoneNumber));
    } catch (e) {
      els('loginErr').textContent = 'שגיאה באימות. נסו שוב.';
      els('loginErr').classList.add('show');
      await signOut(auth);
      return;
    }

    if (!snap.exists()) {
      els('loginErr').textContent = 'מספר הטלפון אינו מזוהה במערכת. פנו לרכז/ת.';
      els('loginErr').classList.add('show');
      await signOut(auth);
      return;
    }

    currentDriverName = snap.data().name || user.phoneNumber;
    els('driverLabel').textContent = currentDriverName;
    showScreen('main');
    renderQueueStatus();
  });

  function getRecaptcha(){
    if (!recaptchaVerifier) {
      recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'invisible' });
    }
    return recaptchaVerifier;
  }

  els('sendCodeBtn').onclick = async () => {
    const phone = toE164(els('phoneInput').value);
    els('loginErr').classList.remove('show');
    if (!els('phoneInput').value.trim()) return;

    if (!navigator.onLine) {
      els('loginErr').textContent = 'אין חיבור לאינטרנט. יש למצוא קליטה או Wi-Fi כדי להתחבר בפעם הראשונה.';
      els('loginErr').classList.add('show');
      return;
    }

    els('sendCodeBtn').disabled = true;
    els('sendCodeBtn').textContent = 'שולח…';
    try {
      confirmationResult = await signInWithPhoneNumber(auth, phone, getRecaptcha());
      document.getElementById('phoneStep').style.display = 'none';
      document.getElementById('codeStep').style.display = 'block';
    } catch (e) {
      els('loginErr').textContent = 'לא ניתן לשלוח קוד. בדקו את מספר הטלפון ונסו שוב.';
      els('loginErr').classList.add('show');
    }
    els('sendCodeBtn').disabled = false;
    els('sendCodeBtn').textContent = 'שליחת קוד';
  };

  els('verifyCodeBtn').onclick = async () => {
    const code = els('codeInput').value.trim();
    els('loginErr').classList.remove('show');
    if (!code || !confirmationResult) return;

    els('verifyCodeBtn').disabled = true;
    try {
      await confirmationResult.confirm(code);
      // onAuthStateChanged above takes over from here.
    } catch (e) {
      els('loginErr').textContent = 'קוד שגוי. נסו שוב.';
      els('loginErr').classList.add('show');
    }
    els('verifyCodeBtn').disabled = false;
  };

  els('resendBtn').onclick = () => {
    document.getElementById('codeStep').style.display = 'none';
    document.getElementById('phoneStep').style.display = 'block';
    els('codeInput').value = '';
  };

  els('logoutBtn').onclick = () => {
    document.getElementById('phoneStep').style.display = 'block';
    document.getElementById('codeStep').style.display = 'none';
    els('phoneInput').value = ''; els('codeInput').value = '';
    signOut(auth);
  };

  // ---------- Barcode scanner (real 1D barcodes, not just QR) ----------
  let html5QrCode, scanTimeout;
  els('scanBtn').onclick = () => {
    els('scanner-overlay').classList.add('show');
    els('scan-hint-text').textContent = 'כוונו את הברקוד למרכז המסגרת';
    html5QrCode = new Html5Qrcode('reader');
    const formats = [
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.QR_CODE
    ];
    html5QrCode.start(
      { facingMode: { ideal: 'environment' } },
      {
        fps: 15,
        qrbox: { width: 300, height: 140 }, // wide box suits linear barcodes
        formatsToSupport: formats,
        videoConstraints: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      },
      decodedText => { els('shipmentInput').value = decodedText.trim(); stopScanner(); }
    ).then(() => {
      scanTimeout = setTimeout(() => {
        els('scan-hint-text').textContent = 'לא מצליחים לסרוק? אפשר להקליד את המספר ידנית';
      }, 6000);
    }).catch(err => {
      stopScanner();
      alert('שגיאת מצלמה: ' + (err && err.message ? err.message : err));
    });
  };
  function stopScanner(){
    clearTimeout(scanTimeout);
    if (html5QrCode) html5QrCode.stop().catch(()=>{});
    els('scanner-overlay').classList.remove('show');
  }
  els('closeScan').onclick = stopScanner;

  // ---------- Photo capture (compressed harder for faster upload) ----------
  let doorFile = null, approvalFile = null;

  function resizeAndEncode(file, cb){
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => { img.src = e.target.result; };
    img.onload = () => {
      const maxDim = 1280;
      let { width, height } = img;
      if (width > maxDim || height > maxDim) {
        const scale = maxDim / Math.max(width, height);
        width *= scale; height *= scale;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.62);
      cb({ mimeType: 'image/jpeg', data: dataUrl.split(',')[1] }, dataUrl);
    };
    reader.readAsDataURL(file);
  }

  els('doorBtn').onclick = () => els('doorInput').click();
  els('doorGalleryBtn').onclick = () => els('doorGalleryInput').click();
  els('approvalBtn').onclick = () => els('approvalInput').click();

  function handleDoorFile(f){
    if (!f) return;
    resizeAndEncode(f, (payload, preview) => {
      doorFile = payload;
      els('doorThumb').src = preview; els('doorThumb').classList.add('show');
      els('doorBtn').classList.add('done'); els('doorGalleryBtn').classList.add('done');
      els('doorBtnText').textContent = 'תמונה נבחרה';
      els('doorNum').classList.add('done'); els('doorNum').innerHTML = checkMark();
    });
  }
  els('doorInput').onchange = e => handleDoorFile(e.target.files[0]);
  els('doorGalleryInput').onchange = e => handleDoorFile(e.target.files[0]);
  els('approvalInput').onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    resizeAndEncode(f, (payload, preview) => {
      approvalFile = payload;
      els('approvalThumb').src = preview; els('approvalThumb').classList.add('show');
      els('approvalBtn').classList.add('done'); els('approvalBtnText').textContent = 'תמונה נבחרה — לשינוי לחצו שוב';
      els('approvalNum').classList.add('done'); els('approvalNum').innerHTML = checkMark();
    });
  };
  function checkMark(){
    return '<svg viewBox="0 0 24 24" fill="none" width="13" height="13"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }

  // ---------- Non-blocking submission queue ----------
  // Tapping submit hands the upload off to a background queue and lets the
  // driver move to the next parcel immediately — it doesn't sit and wait for
  // the network round trip. Failed items retry automatically with backoff;
  // the queue survives an app reload via localStorage.

  function loadQueue(){ try { return JSON.parse(localStorage.getItem('pod_queue') || '[]'); } catch(e){ return []; } }
  function saveQueue(q){ localStorage.setItem('pod_queue', JSON.stringify(q)); }

  function renderQueueStatus(){
    const q = loadQueue();
    const pending = q.filter(i => i.status !== 'failed').length;
    const failed = q.filter(i => i.status === 'failed');

    els('pendingPill').classList.toggle('show', pending > 0);
    els('pendingText').textContent = !navigator.onLine
      ? 'אין חיבור לאינטרנט — ישלח אוטומטית כשהחיבור יחזור'
      : (pending === 1 ? 'שולח משלוח 1…' : `שולח ${pending} משלוחים…`);

    els('retryBanner').classList.toggle('show', failed.length > 0);
    if (failed.length) {
      els('retryText').textContent = failed.length === 1
        ? `משלוח ${failed[0].shipment} לא נשלח`
        : `${failed.length} משלוחים לא נשלחו`;
    }
  }

  async function processQueue(){
    const q = loadQueue();
    const next = q.find(i => i.status === 'pending');
    if (!next) return;

    if (!navigator.onLine) {
      renderQueueStatus();
      return; // wait for the 'online' event below rather than burning a retry attempt
    }

    try {
      // Force-refresh the token here — this is the one moment we actually
      // need a live connection, and doing it explicitly (rather than
      // trusting a possibly-stale cached token) is what makes a delivery
      // queued hours earlier while offline still submit correctly once
      // signal returns.
      const idToken = await auth.currentUser.getIdToken(true);
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          idToken, driverName: next.driverName, shipment: next.shipment,
          doorPhoto: next.doorPhoto, approvalPhoto: next.approvalPhoto
        })
      }).then(r => r.json());

      const q2 = loadQueue();
      const idx = q2.findIndex(i => i.id === next.id);
      const sessionIssue = !res.ok && /session|log in again/i.test(res.message || '');

      if (res.ok) {
        if (idx > -1) q2.splice(idx, 1);
      } else if (idx > -1 && sessionIssue) {
        q2[idx].sessionRetries = (q2[idx].sessionRetries || 0) + 1;
        if (q2[idx].sessionRetries >= 15) {
          q2[idx].status = 'failed';
          q2[idx].message = 'בעיית התחברות מתמשכת — יש להתנתק ולהתחבר מחדש';
        }
      } else if (idx > -1) {
        // A real rejection (bad data, not an approved driver, etc.) —
        // this is a genuine failure, surface it.
        q2[idx].status = 'failed';
        q2[idx].message = res.message || 'שליחה נכשלה';
      }
      saveQueue(q2);
    } catch (e) {
      const q2 = loadQueue();
      const idx = q2.findIndex(i => i.id === next.id);
      if (idx > -1) { q2[idx].attempts = (q2[idx].attempts || 0) + 1;
        if (q2[idx].attempts >= 3) q2[idx].status = 'failed';
      }
      saveQueue(q2);
    }
    renderQueueStatus();
    setTimeout(processQueue, 1500); // keep draining, with a small pause between attempts
  }

  els('retryBtn').onclick = () => {
    const q = loadQueue().map(i => i.status === 'failed' ? { ...i, status: 'pending', attempts: 0 } : i);
    saveQueue(q);
    renderQueueStatus();
    processQueue();
  };

  els('submitBtn').onclick = () => {
    const shipment = els('shipmentInput').value.trim();
    els('submitErr').classList.remove('show');

    if (!shipment || !doorFile || !approvalFile) {
      els('submitErr').textContent = 'נא למלא מספר משלוח ושתי התמונות.';
      els('submitErr').classList.add('show');
      return;
    }

    const q = loadQueue();
    q.push({
      id: `${Date.now()}_${Math.random().toString(36).slice(2)}`,
      shipment, driverName: currentDriverName,
      doorPhoto: doorFile, approvalPhoto: approvalFile,
      status: 'pending', attempts: 0
    });
    saveQueue(q);

    els('successNum').textContent = shipment;
    showScreen('success');
    renderQueueStatus();
    processQueue();
  };

  els('nextBtn').onclick = () => {
    els('shipmentInput').value = '';
    doorFile = null; approvalFile = null;
    els('doorThumb').classList.remove('show'); els('approvalThumb').classList.remove('show');
    els('doorBtn').classList.remove('done'); els('doorGalleryBtn').classList.remove('done'); els('doorBtnText').textContent = 'מצלמה';
    els('approvalBtn').classList.remove('done'); els('approvalBtnText').textContent = 'בחירת תמונה';
    els('doorNum').classList.remove('done'); els('doorNum').textContent = '2';
    els('approvalNum').classList.remove('done'); els('approvalNum').textContent = '3';
    els('submitBtn').textContent = 'שליחת אישור מסירה';
    showScreen('main');
  };

  // Resume any queued submissions from a previous session on load
  window.addEventListener('load', () => {
    renderQueueStatus();
    processQueue();
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    }
  });
  window.addEventListener('online', processQueue);
</script>
</body>
</html>
